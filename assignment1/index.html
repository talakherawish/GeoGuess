<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GeoGuess</title>

    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <button id="theme-toggle" aria-label="Toggle theme">🌙</button>

    <section id="start-screen" class="screen active">
        <div class="intro-card">
            <h1>GeoGuess</h1>

            <p class="intro-text">
                Three minutes. Three challenges. One smarter brain.
            </p>

            <div class="progress-preview">
                <p>Flags  -  Capitals  -  Countries</p>
            </div>

            <button id="start-btn" class="start-btn">Start Challenge</button>
        </div>
    </section>

    <section id="game-screen" class="screen">
        <main class="container">
            <div class="top-bar">
                <p>ROUND: <span id="round-label">Flags</span></p>
                <p>TIME: <span id="timer">60</span></p>
                <p>SCORE: <span id="score">0</span></p>
            </div>

            <div class="progress-bar">
                <div class="progress-item active" id="progress-flags">Flags</div>
                <div class="progress-item" id="progress-capitals">Capitals</div>
                <div class="progress-item" id="progress-countries">Countries</div>
            </div>

            <section class="game-card">
                <div class="prompt-area">
                    <img id="flag" src="" alt="Flag question">
                    <p id="prompt-text"></p>
                </div>

                <h2 id="question"></h2>

                <div id="answers" class="answers-grid" aria-label="Answer choices">
                    <button class="option-btn"></button>
                    <button class="option-btn"></button>
                    <button class="option-btn"></button>
                    <button class="option-btn"></button>
                </div>

                <div class="round-controls">
                    <p id="status-text">Press start to begin the Flags round.</p>
                    <button id="round-action-btn" class="start-btn">Start Flags Round</button>
                </div>
            </section>
        </main>
    </section>

    <section id="end-screen" class="screen">
        <div class="intro-card">
            <h1>Finished!</h1>
            <p id="final-score"></p>
            <p id="end-message"></p>

            <div class="completion-list">
                <p>Flags ✓</p>
                <p>Capitals ✓</p>
                <p>Countries ✓</p>
            </div>

            <button id="restart-btn" class="start-btn">Play Again</button>
        </div>
    </section>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
